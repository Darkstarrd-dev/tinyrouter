<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TinyRouter</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#12121a">
<script>
(function() {
  var theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  var fontSize = localStorage.getItem('fontSize') || 's';
  document.documentElement.setAttribute('data-font-size', fontSize);
  var lang = localStorage.getItem('lang') || 'en';
  document.documentElement.setAttribute('data-lang', lang);
})();
</script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
<header class="top-header">
<div class="top-header-brand">
<a href="https://github.com/Darkstarrd-dev/tinyrouter" target="_blank" rel="noopener noreferrer" class="sidebar-logo-link" title="Open project page">
<img src="/logo-sm.png" alt="TinyRouter" class="sidebar-logo" width="40" height="40">
</a>
<div class="sidebar-brand-content">
<h1>TinyRouter</h1>
<div class="header-controls">
<button class="header-icon-btn" id="lang-btn" onclick="toggleLang()" title="Switch language" aria-label="Switch language">EN</button>
<button class="header-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
<button class="header-icon-btn" id="font-btn" onclick="toggleFontSize()" title="Toggle font size" aria-label="Toggle font size">S</button>
</div>
</div>
</div>
<nav class="top-header-nav">
<button class="nav-item active" type="button" data-page="usage">Usage</button>
<button class="nav-item" type="button" data-page="endpoint">Settings</button>
<button class="nav-item" type="button" data-page="console">Console</button>
</nav>
<div class="top-header-stats">
<div id="header-stat-grid" class="stat-grid">
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalRequests"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="success"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="errors"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="avgLatency"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalInput"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalOutput"></div></div>
</div>
</div>
<div class="top-header-shutdown">
<button class="shutdown-btn" onclick="shutdownServer()">Shutdown</button>
</div>
</header>
<main class="main">
<div id="page-content"></div>
</main>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>
<div id="modal-overlay" class="modal-overlay"></div>
<script src="/i18n.js"></script>
<script src="/api.js"></script>
<script src="/app.js"></script>
<script src="/endpoint.js"></script>
<script src="/providers.js"></script>
<script src="/combos.js"></script>
<script src="/headerStats.js"></script>
<script src="/usage.js"></script>
<script src="/console.js"></script>
</body>
</html>
