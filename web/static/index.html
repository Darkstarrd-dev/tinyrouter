<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TinyRouter</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#12121a">
<script>
(function() {
  var theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  var fontSize = localStorage.getItem('fontSize') || 's';
  document.documentElement.setAttribute('data-font-size', fontSize);
  var lang = localStorage.getItem('lang') || 'en';
  document.documentElement.setAttribute('data-lang', lang);
})();
</script>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sidebar-header">
<div class="sidebar-brand">
<img src="/logo-sm.png" alt="TinyRouter" class="sidebar-logo" width="36" height="36">
<div class="sidebar-brand-content">
<h1>TinyRouter</h1>
<div class="header-controls">
<button class="header-icon-btn" id="lang-btn" onclick="toggleLang()" title="Switch language">EN</button>
<button class="header-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">&#9788;</button>
<button class="header-icon-btn" id="font-btn" onclick="toggleFontSize()" title="Toggle font size">S</button>
</div>
</div>
</div>
</div>
<nav class="sidebar-nav">
<div class="nav-item active" data-page="endpoint">Endpoint</div>
<div class="nav-item" data-page="providers">Providers</div>
<div class="nav-item" data-page="combos">Combos</div>
<div class="nav-item" data-page="usage">Usage</div>
<div class="nav-item" data-page="console">Console</div>
</nav>
<div class="sidebar-footer">
<button class="shutdown-btn" onclick="shutdownServer()">Shutdown</button>
</div>
</aside>
<main class="main">
<div id="page-content"></div>
</main>
</div>
<div id="toast-container"></div>
<div id="modal-overlay" class="modal-overlay"></div>
<script src="/i18n.js"></script>
<script src="/api.js"></script>
<script src="/app.js"></script>
<script src="/endpoint.js"></script>
<script src="/providers.js"></script>
<script src="/combos.js"></script>
<script src="/usage.js"></script>
<script src="/console.js"></script>
</body>
</html>
