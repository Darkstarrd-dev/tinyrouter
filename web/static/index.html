<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TinyRouter V2.0.0</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0b0c13" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f9fc" media="(prefers-color-scheme: light)">
<script>
(function() {
  var theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  var fontSize = localStorage.getItem('fontSize') || 's';
  document.documentElement.setAttribute('data-font-size', fontSize);
  var lang = localStorage.getItem('lang') || 'en';
  document.documentElement.setAttribute('data-lang', lang);
})();
window.__hasPlayground = true;
</script>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/xterm/xterm.css">
<link rel="stylesheet" href="/playground.css">
<link rel="stylesheet" href="/vendor/pg-highlight-theme.css">
<link rel="stylesheet" href="/vendor/katex.min.css">
</head>
<body>
<div class="app">
<header class="top-header">
<div class="top-header-brand">
<a href="https://github.com/Darkstarrd-dev/tinyrouter" target="_blank" rel="noopener noreferrer" class="sidebar-logo-link" title="Open project page">
<img src="/logo-sm.png" alt="TinyRouter" class="sidebar-logo" width="40" height="40">
</a>
<div class="sidebar-brand-content">
<h1>TinyRouter</h1>
<div class="header-controls">
      <button class="header-icon-btn" id="lang-btn" onclick="toggleLang()" title="Switch language" aria-label="Switch language">EN</button>
      <button class="header-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
      <button class="header-icon-btn" id="font-btn" onclick="toggleFontSize()" title="Toggle font size" aria-label="Toggle font size">S</button>
</div>
</div>
</div>
<nav class="top-header-nav">
<button class="nav-item active" type="button" data-page="usage">Usage</button>
<button class="nav-item" type="button" data-page="endpoint">Settings</button>
<button class="nav-item" type="button" data-page="console">Console</button>
<button class="nav-item" type="button" data-page="download">Download</button>
<button class="nav-item" type="button" data-page="playground">Playground</button>
<button class="nav-item" type="button" data-page="gallery">Gallery</button>
</nav>
<div id="quickslot-header" class="quickslot-header"></div>
<div class="top-header-stats">
<div id="header-stat-grid" class="stat-grid">
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalRequests"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="success"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="errors"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="avgLatency"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalInput"></div></div>
<div class="stat-card"><div class="stat-value">&mdash;</div><div class="stat-label" data-i18n="totalOutput"></div></div>
</div>
</div>
<div class="top-header-shutdown">
<button class="shutdown-btn" onclick="shutdownServer()" title="Shutdown" aria-label="Shutdown"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
</div>
</header>
<main class="main">
<div id="page-content"></div>
</main>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>
<div id="modal-overlay" class="modal-overlay"></div>
<div id="info-modal-overlay" class="info-modal-overlay">
  <div class="info-modal">
    <div class="info-modal-header">
      <span class="info-modal-title" id="info-modal-title"></span>
      <div class="info-modal-search" id="info-modal-search">
        <input type="text" id="info-modal-search-input" placeholder="Search..." autocomplete="off">
        <button type="button" id="info-modal-search-prev" title="Previous">&uarr;</button>
        <button type="button" id="info-modal-search-next" title="Next">&darr;</button>
        <span id="info-modal-search-count"></span>
      </div>
      <span class="info-modal-header-actions">
        <button class="info-copy-all-btn" id="info-modal-copy-all" onclick="copyAllInfo(this)">Copy All</button>
        <button class="info-modal-close" onclick="closeInfoModal()">&times;</button>
      </span>
    </div>
    <div class="info-modal-body" id="info-modal-body"></div>
  </div>
</div>
<script src="/i18n.js"></script>
<script src="/api.js"></script>
<script src="/auth.js"></script>
<script src="/app.js"></script>
<script src="/shortcuts.js"></script>
<script src="/endpoint.js"></script>
<script src="/info_common.js"></script>
<script src="/providers.js"></script>
<script src="/combos.js"></script>
<script src="/quickslots.js"></script>
<script src="/headerStats.js"></script>
<script src="/chart.umd.js"></script>
<script src="/usage.js"></script>
<script src="/xterm/xterm.js"></script>
<script src="/monitor.js"></script>
<script src="/terminal.js"></script>
<script src="/console.js"></script>
<script src="/download.js"></script>
<!-- Playground vendor deps (load order matters: katex -> marked -> ext -> purify -> hljs -> mermaid) -->
<script src="/vendor/katex.min.js"></script>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/marked-katex-extension.umd.js"></script>
<script src="/vendor/purify.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script src="/vendor/mermaid.min.js"></script>
<script>if (window.mermaid) { window.mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'strict', themeVariables: { background: '#1a1326', primaryColor: '#c4a6ff', primaryTextColor: '#e6def0', lineColor: '#a89bd6', secondaryColor: '#2a1f3d', tertiaryColor: '#3a2c5e' } }); }</script>
<!-- Unified File System API (BlobTracker, pickers, save, drag/drop collector) -->
<script src="/fs-api.js"></script>
<!-- Playground modules (load order matters: core → state → markdown → request → stream → autochat → setup → director → render → ui → modal → lifecycle) -->
<script src="/pg-i18n.js"></script>
<script src="/pg-core.js"></script>
<script src="/pg-state.js"></script>
<script src="/pg-markdown.js"></script>
<script src="/pg-request.js"></script>
<script src="/pg-stream.js"></script>
<script src="/pg-autochat.js"></script>
<script src="/pg-setup.js"></script>
<script src="/pg-director.js"></script>
<script src="/pg-search.js" defer></script>
<script src="/pg-render.js"></script>
<script src="/pg-ui.js"></script>
<script src="/pg-modal.js"></script>
<script src="/pg-lifecycle.js"></script>
<script src="/gallery-state.js"></script>
<script src="/gallery-io.js"></script>
<script src="/gallery-layout.js"></script>
<script src="/gallery-tree.js"></script>
<script src="/gallery-review.js"></script>
<script src="/gallery-video.js"></script>
<script src="/gallery-fullscreen.js"></script>
<script src="/gallery.js"></script>
</body>
</html>
