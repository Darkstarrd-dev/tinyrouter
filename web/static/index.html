<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TinyRouter</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#12121a">
<script>
(function() {
  var theme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  var fontSize = localStorage.getItem('fontSize') || 's';
  document.documentElement.setAttribute('data-font-size', fontSize);
  var lang = localStorage.getItem('lang') || 'en';
  document.documentElement.setAttribute('data-lang', lang);
})();
</script>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/vendor/pg-highlight-theme.css">
<link rel="stylesheet" href="/vendor/katex.min.css">
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="sidebar-header">
<div class="sidebar-brand">
<img src="/logo-sm.png" alt="TinyRouter" class="sidebar-logo" width="36" height="36">
<div class="sidebar-brand-content">
<h1>TinyRouter</h1>
<div class="header-controls">
<button class="header-icon-btn" id="lang-btn" onclick="toggleLang()" title="Switch language">EN</button>
<button class="header-icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg></button>
<button class="header-icon-btn" id="font-btn" onclick="toggleFontSize()" title="Toggle font size">S</button>
</div>
</div>
</div>
</div>
<nav class="sidebar-nav">
<button class="nav-item active" type="button" data-page="endpoint">Endpoint</button>
<button class="nav-item" type="button" data-page="providers">Providers</button>
<button class="nav-item" type="button" data-page="combos">Combos</button>
<button class="nav-item" type="button" data-page="playground">Playground</button>
<button class="nav-item" type="button" data-page="usage">Usage</button>
<button class="nav-item" type="button" data-page="console">Console</button>
</nav>
<div class="sidebar-footer">
<button class="shutdown-btn" onclick="shutdownServer()">Shutdown</button>
</div>
</aside>
<main class="main">
<div id="page-content"></div>
</main>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>
<div id="modal-overlay" class="modal-overlay"></div>
<script src="/i18n.js"></script>
<script src="/api.js"></script>
<script src="/app.js"></script>
<script src="/endpoint.js"></script>
<script src="/providers.js"></script>
<script src="/combos.js"></script>
<script src="/usage.js"></script>
<script src="/console.js"></script>
<!-- Playground vendor deps (load order matters: katex -> marked -> ext -> purify -> hljs -> mermaid) -->
<script src="/vendor/katex.min.js"></script>
<script src="/vendor/marked.min.js"></script>
<script src="/vendor/marked-katex-extension.umd.js"></script>
<script src="/vendor/purify.min.js"></script>
<script src="/vendor/highlight.min.js"></script>
<script src="/vendor/mermaid.min.js"></script>
<script>if (window.mermaid) { window.mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose', themeVariables: { background: '#1a1326', primaryColor: '#c4a6ff', primaryTextColor: '#e6def0', lineColor: '#a89bd6', secondaryColor: '#2a1f3d', tertiaryColor: '#3a2c5e' } }); }</script>
<script src="/playground.js"></script>
</body>
</html>
